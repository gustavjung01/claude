<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>Local CMD Agent</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0b1020;
      color: #eef3ff;
      font-family: Segoe UI, Arial, sans-serif;
      overflow: hidden;
    }
    .app {
      display: grid;
      grid-template-columns: 290px 1fr 390px;
      height: 100vh;
    }
    .side, .right {
      background: #1f1f23;
      border-right: 1px solid #3b3b42;
      padding: 16px;
      overflow: auto;
    }
    .right {
      border-right: 0;
      border-left: 1px solid #3b3b42;
    }
    .main {
      display: grid;
      grid-template-rows: auto 1fr;
      min-width: 0;
      background: #111;
    }
    h2 { margin: 0 0 14px; font-size: 18px; letter-spacing: .5px; }
    h3 { margin: 14px 0 8px; font-size: 15px; color: #cbd5e1; }
    button {
      border: 0;
      border-radius: 8px;
      padding: 12px 14px;
      background: #1473b7;
      color: white;
      font-weight: 800;
      cursor: pointer;
    }
    button.gray { background: #3a3a40; }
    button.red { background: #733040; }
    button.green { background: #0c7a43; }
    button.big { font-size: 16px; padding: 14px 18px; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    input, textarea, select {
      width: 100%;
      background: #303033;
      color: #f5f5f5;
      border: 1px solid #4a4a50;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      outline: none;
    }
    textarea { resize: vertical; line-height: 1.5; }
    label { display: block; color: #a9a9b3; font-size: 13px; margin: 10px 0 6px; }
    .row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
    .check { display: flex; gap: 8px; align-items: center; color: #cbd5e1; font-size: 13px; margin: 8px 0; }
    .check input { width: auto; }
    .cwd { font-size: 12px; color: #bfc7d5; word-break: break-all; padding: 10px 0; }
    .fileList { margin-top: 12px; border-top: 1px solid #3b3b42; padding-top: 10px; }
    .file { padding: 7px; border-radius: 6px; cursor: pointer; color: #e8e8ee; font-size: 13px; word-break: break-all; }
    .file:hover, .file.active { background: #2b2b31; }
    .terminalTop { background: #222226; border-bottom: 1px solid #3b3b42; padding: 16px; }
    .cmdArea { min-height: 120px; font-family: Consolas, monospace; font-size: 15px; }
    .output {
      margin: 0;
      padding: 18px;
      white-space: pre-wrap;
      overflow: auto;
      font-family: Consolas, monospace;
      font-size: 14px;
      color: #f2f2f2;
      background: #050505;
    }
    .status { color: #7ee787; font-size: 13px; margin-top: 10px; min-height: 18px; }
    .warn { color: #ffd166; }
    .bad { color: #ff7b72; }
    .preview {
      background: #111;
      border: 1px solid #3b3b42;
      border-radius: 8px;
      padding: 12px;
      white-space: pre-wrap;
      overflow: auto;
      font-family: Consolas, monospace;
      font-size: 13px;
      max-height: 220px;
    }
    .hint { color: #a9a9b3; font-size: 13px; line-height: 1.45; }
    .tokenBox {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      background: #111;
      border: 1px solid #3b3b42;
      border-radius: 8px;
      padding: 10px;
      margin-top: 10px;
      font-size: 13px;
      color: #cbd5e1;
    }
    .tokenBox b { color: #5eead4; }
    .chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0 4px; }
    .chip { border: 1px solid #3b3b42; background: #171a24; color: #d9e2ff; border-radius: 999px; padding: 8px 12px; cursor: pointer; font-size: 13px; }
    .chip.active, .chip:hover { background: #23568f; border-color: #4a7acc; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: none; align-items: center; justify-content: center; z-index: 20; }
    .modal { width: min(460px, calc(100% - 32px)); background: #151820; border: 1px solid #3b3b42; border-radius: 16px; padding: 20px; box-shadow: 0 0 0 1px rgba(255,255,255,0.04); }
    .modal p { margin: 0 0 18px; color: #d9e2ff; line-height: 1.5; }
    .modal-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .modal button { min-width: 120px; }
    .divider { border-top: 1px solid #3b3b42; margin: 14px 0; }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/xterm@4.19.0/css/xterm.css" />
  <script src="https://unpkg.com/xterm@4.19.0/lib/xterm.js"></script>
</head>
<body>
  <div class="app">
    <aside class="side">
      <h2>WORKSPACE</h2>
      <button id="selectFolder" class="big" style="width:100%">📁 SELECT FOLDER</button>
      <div id="cwdText" class="cwd">Chưa chọn thư mục.</div>
      <div class="fileList" id="fileList"></div>
    </aside>

    <main class="main">
      <div class="terminalTop">
        <h2>TERMINAL SESSION</h2>
        <div class="row">
          <button id="startModel" class="big green">▶ START MODEL TERMINAL</button>
          <button id="stopModel" class="gray big">■ STOP</button>
          <button id="clearModel" class="red big">🧹 CLEAR</button>
          <button id="copyModelOutput" class="gray big">📋 COPY TERMINAL OUTPUT</button>
        </div>
        <div id="termStatus" class="status">Model: <span id="runningModel">(stopped)</span> · CWD: <span id="termCwd">(none)</span></div>
      </div>
      <div id="terminal" class="output" style="height: calc(100vh - 160px);">Terminal not started.</div>
    </main>

    <aside class="right">
      <h2>FILE PREVIEW</h2>
      <div class="hint">Chọn file bên trái để xem. Nội dung chỉ hiển thị cục bộ.</div>
      <label>Preview</label>
      <pre id="preview" class="preview">Chưa chọn file.</pre>

      <div class="divider"></div>

      <h2>MODEL CONFIG</h2>
      <div class="hint">Token không được lưu. START sẽ spawn CLI với env từ UI.</div>

      <label>Base URL</label>
      <input id="baseUrl" value="https://unlimited.aiprimetech.io">

      <label>Token</label>
      <input id="aiToken" type="password" placeholder="Dán token khi cần, không lưu">

      <button id="loadModels" class="gray" style="width:100%;margin-top:10px">LOAD MODELS</button>

      <label>Model</label>
      <select id="modelSelect">
        <option value="claude-haiku-4-5-20251001">claude-haiku-4-5-20251001</option>
        <option value="claude-3-7-sonnet-20250219">claude-3-7-sonnet-20250219</option>
        <option value="claude-3-5-sonnet-20241022">claude-3-5-sonnet-20241022</option>
      </select>

      <label>Custom model ID</label>
      <input id="customModel" placeholder="Để trống nếu dùng dropdown">

      <div class="row" style="margin-top:12px">
        <button id="startModelBtn" class="green" style="flex:1">START MODEL TERMINAL</button>
        <button id="stopModelBtn" class="gray" style="flex:1">STOP TERMINAL</button>
      </div>

      <div class="row" style="margin-top:8px">
        <button id="clearTerminalBtn" class="red" style="flex:1">CLEAR TERMINAL</button>
        <button id="copyTerminalBtn" class="gray" style="flex:1">COPY TERMINAL OUTPUT</button>
      </div>

      <div id="aiStatus" class="status">Model not running.</div>
    </aside>
  </div>

  <!-- confirm modal removed for model-terminal-only UX -->

<script>
const $ = id => document.getElementById(id);

let currentFolder = "";
let lastOutput = "";
let selectedFileName = "";
let selectedFileText = "";
let reqCount = 0;
let totalInput = 0;
let totalOutput = 0;
let totalCacheCreate = 0;
let totalCacheRead = 0;

function setStatus(text, cls="") {
  $("status").className = "status " + cls;
  $("status").textContent = text;
}

function setAiStatus(text, cls="") {
  $("aiStatus").className = "status " + cls;
  $("aiStatus").textContent = text;
}

function dangerous(cmd) {
  return /git\s+push|deploy|rm\s+-rf|del\s+\/s|format\s|type\s+\.env|cat\s+\.env/i.test(cmd);
}

function appendOutput(text) {
  lastOutput += text;
  $("output").textContent = lastOutput;
  $("output").scrollTop = $("output").scrollHeight;
}

function effectiveModel() {
  return $("customModel").value.trim() || $("modelSelect").value;
}

function updateTokenBox(usage) {
  const input = Number(usage?.input_tokens || 0);
  const output = Number(usage?.output_tokens || 0);
  const cc = Number(usage?.cache_creation_input_tokens || 0);
  const cr = Number(usage?.cache_read_input_tokens || 0);

  reqCount += 1;
  totalInput += input;
  totalOutput += output;
  totalCacheCreate += cc;
  totalCacheRead += cr;

  $("inTok").textContent = totalInput.toLocaleString();
  $("outTok").textContent = totalOutput.toLocaleString();
  $("cacheCreate").textContent = totalCacheCreate.toLocaleString();
  $("cacheRead").textContent = totalCacheRead.toLocaleString();
  $("reqCount").textContent = reqCount.toLocaleString();
  $("totalTok").textContent = (totalInput + totalOutput + totalCacheCreate + totalCacheRead).toLocaleString();
}

async function loadFiles() {
  if (!currentFolder) return;

  const files = await window.cmdTool.listFiles(currentFolder);
  const box = $("fileList");
  box.innerHTML = "";

  if (!files.length) {
    box.innerHTML = "<div class='hint'>Không có file text nhẹ để hiển thị.</div>";
    return;
  }

  for (const f of files) {
    const div = document.createElement("div");
    div.className = "file";
    div.textContent = "📄 " + f.rel;
    div.onclick = async () => {
      try {
        document.querySelectorAll(".file").forEach(x => x.classList.remove("active"));
        div.classList.add("active");
        selectedFileName = f.rel;
        selectedFileText = await window.cmdTool.readFile({ folder: currentFolder, rel: f.rel });
        $("preview").textContent = selectedFileText;
      } catch (e) {
        $("preview").textContent = "Lỗi đọc file: " + e.message;
      }
    };
    box.appendChild(div);
  }
}

$("selectFolder").onclick = async () => {
  const folder = await window.cmdTool.selectFolder();
  if (!folder) return;

  currentFolder = folder;
  $("cwdText").textContent = folder;
  localStorage.setItem("cmd_tool_folder", folder);
  setStatus("Đã chọn thư mục.");
  await loadFiles();
};

$("runCmd").onclick = async () => {
  const command = $("cmdInput").value.trim();

  if (!command) {
    setStatus("Chưa nhập lệnh.", "warn");
    return;
  }

  if (dangerous(command) && !confirm("Lệnh có vẻ nguy hiểm. Chạy tiếp không?")) return;

  if ($("autoClearCmd").checked) {
    $("cmdInput").value = "";
    $("cmdInput").focus();
  }

  lastOutput = "";
  $("output").textContent = "Running...\n";
  setStatus("Đang chạy CMD...");

  const result = await window.cmdTool.runCmd({
    cwd: currentFolder,
    command
  });

  lastOutput =
    "CWD: " + result.cwd + "\n" +
    "COMMAND: " + result.command + "\n" +
    "EXIT: " + result.exitCode + "\n\n" +
    "STDOUT:\n" + (result.stdout || "") + "\n\n" +
    "STDERR:\n" + (result.stderr || "");

  $("output").textContent = lastOutput;
  setStatus(result.ok ? "CMD chạy xong OK." : "CMD chạy xong, có lỗi.", result.ok ? "" : "bad");
};

$("stopCmd").onclick = async () => {
  await window.cmdTool.stopCmd();
  setStatus("Đã gửi lệnh STOP.");
};

$("copyOutput").onclick = async () => {
  await navigator.clipboard.writeText(lastOutput || $("output").textContent);
  setStatus("Đã copy output.");
};

$("clearOutput").onclick = () => {
  lastOutput = "";
  $("output").textContent = "Cleared.";
  setStatus("Đã xóa output.");
};

$("cmdInput").addEventListener("keydown", e => {
  if (e.ctrlKey && e.key === "Enter") $("runCmd").click();
});

window.cmdTool.onCmdOutput(data => {
  appendOutput(data.text || "");
});

function updateOutput(text) {
  lastOutput = text;
  $("output").textContent = lastOutput;
  $("output").scrollTop = $("output").scrollHeight;
}

function buildClaudePromptForOutput(outputText, requestText) {
  let prompt = "Hãy phân tích đầu ra CMD dưới đây và đề xuất bước tiếp theo.\n";
  prompt += "OUTPUT CMD:\n" + outputText + "\n\n";
  if (requestText) {
    prompt += "YÊU CẦU BỔ SUNG:\n" + requestText + "\n\n";
  }
  prompt += "Chỉ trả lời kế tiếp bằng văn bản. Không chạy lệnh tự động.";
  return prompt;
}

function showConfirm(message, primaryText, secondaryText, primaryHandler, secondaryHandler) {
  const modal = $("confirmModal");
  $("confirmMessage").textContent = message;
  $("modalPrimary").textContent = primaryText;
  $("modalSecondary").textContent = secondaryText;

  const primaryClick = () => {
    hideConfirm();
    primaryHandler();
  };

  const secondaryClick = () => {
    hideConfirm();
    secondaryHandler();
  };

  $("modalPrimary").onclick = primaryClick;
  $("modalSecondary").onclick = secondaryClick;
  modal.style.display = "flex";
}

function hideConfirm() {
  const modal = $("confirmModal");
  modal.style.display = "none";
  $("modalPrimary").onclick = null;
  $("modalSecondary").onclick = null;
}

function isNaturalLanguageInput(text) {
  const trimmed = text.trim();
  if (!trimmed) return false;
  if (/\b(xin chào|chào|kiểm tra|phiên bản|giúp|hỏi|làm ơn|gợi ý|phân tích|lỗi|tìm|cài đặt|mở|xem|cách|hướng dẫn|lặp lại|xử lý)\b/i.test(trimmed) && !/\b(cd|dir|git|npm|node|python|echo|type|copy|move|mkdir|rmdir|del|start|run|tasklist|ipconfig|where|set|chcp|npm|yarn|vendor|composer)\b/i.test(trimmed)) {
    return true;
  }
  if (!/[^A-Za-z0-9_\-\.\\\/:;"'&|()<>,*%$@!\s]/.test(trimmed)) {
    return false;
  }
  return true;
}

function selectModelChip(value) {
  $("modelSelect").value = value;
  document.querySelectorAll(".chip").forEach(x => x.classList.toggle("active", x.dataset.model === value));
}

function createModelChips() {
  const chips = [
    { label: "Haiku 4.5", value: "claude-haiku-4-5-20251001" },
    { label: "Sonnet 3.7", value: "claude-3-7-sonnet-20250219" },
    { label: "Sonnet 3.5", value: "claude-3-5-sonnet-20241022" }
  ];
  const container = $("modelChips");
  container.innerHTML = "";
  for (const item of chips) {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "chip";
    button.dataset.model = item.value;
    button.textContent = item.label;
    button.onclick = () => selectModelChip(item.value);
    container.appendChild(button);
  }
  selectModelChip($("modelSelect").value);
}

$("loadModels").onclick = async () => {
  if (!$("enableAi").checked) {
    setAiStatus("AI đang tắt. Tick 'Bật AI calls' trước.", "warn");
    return;
  }

  const token = $("aiToken").value.trim();
  if (!token) {
    setAiStatus("Thiếu token.", "warn");
    return;
  }

  setAiStatus("Đang load models...", "warn");

  try {
    const data = await window.cmdTool.loadModels({
      baseUrl: $("baseUrl").value.trim(),
      token
    });

    if (!data.models || !data.models.length) {
      setAiStatus("Không lấy được model, giữ fallback list.", "warn");
      return;
    }

    $("modelSelect").innerHTML = "";
    for (const id of data.models) {
      const opt = document.createElement("option");
      opt.value = id;
      opt.textContent = id;
      $("modelSelect").appendChild(opt);
    }

    const preferred = "claude-haiku-4-5-20251001";
    if (data.models.includes(preferred) && data.models.includes(preferred)) $("modelSelect").value = preferred;
    createModelChips();
    setAiStatus("Đã load " + data.models.length + " models.", "");
  } catch (e) {
    setAiStatus("Lỗi load models: " + e.message, "bad");
  }
};

async function runCmdWithText(command) {
  if (dangerous(command) && !confirm("Lệnh có vẻ nguy hiểm. Chạy tiếp không?")) return;

  lastOutput = "";
  updateOutput("Running...\n");
  setStatus("Đang chạy CMD...");

  const result = await window.cmdTool.runCmd({
    cwd: currentFolder,
    command
  });

  updateOutput(
    "CWD: " + result.cwd + "\n" +
    "COMMAND: " + result.command + "\n" +
    "EXIT: " + result.exitCode + "\n\n" +
    "STDOUT:\n" + (result.stdout || "") + "\n\n" +
    "STDERR:\n" + (result.stderr || "")
  );
  setStatus(result.ok ? "CMD chạy xong OK." : "CMD chạy xong, có lỗi.", result.ok ? "" : "bad");
}

$("runCmd").onclick = () => {
  const command = $("cmdInput").value.trim();
  if (!command) {
    setStatus("Chưa nhập lệnh.", "warn");
    return;
  }

  const proceed = async () => {
    await runCmdWithText(command);
    if ($("autoClearCmd").checked) {
      $("cmdInput").value = "";
    }
  };

  if (isNaturalLanguageInput(command)) {
    showConfirm(
      "Nội dung này giống câu hỏi, không giống lệnh CMD. Bạn muốn hỏi Claude hay vẫn chạy CMD?",
      "ASK CLAUDE",
      "RUN ANYWAY",
      () => $("askClaude").click(),
      proceed
    );
    return;
  }

  proceed();
};

// --- Model terminal logic ---
let terminalAccum = "";
let xtermInstance = null;
let terminalStarted = false;

function initXtermIfNeeded() {
  if (xtermInstance) return;
  if (window.Terminal) {
    try {
      xtermInstance = new window.Terminal({ cursorBlink: true });
      xtermInstance.open($("terminal"));
      xtermInstance.onData(d => {
        // send keystrokes to pty
        window.modelTerminal.write(d).catch(() => {});
      });
    } catch (e) {
      xtermInstance = null;
    }
  }
}

window.modelTerminal.onData(d => {
  const text = d.text || "";
  terminalAccum += text;
  if (xtermInstance) {
    xtermInstance.write(text);
  } else {
    // fallback render into terminal div
    $("terminal").textContent += text;
    $("terminal").scrollTop = $("terminal").scrollHeight;
  }
});

window.modelTerminal.onFallback(d => {
  setStatus(d.message || 'External CMD opened (fallback).', 'warn');
});

function updateTerminalStatus(model, cwd) {
  $("runningModel").textContent = model || '(stopped)';
  $("termCwd").textContent = cwd || '(none)';
}

$("startModelBtn").onclick = async () => {
  const model = effectiveModel();
  const baseUrl = $("baseUrl").value.trim();
  const token = $("aiToken").value.trim();
  const cwd = currentFolder || '';

  setStatus('Starting model terminal...', '');
  const res = await window.modelTerminal.start({ baseUrl, token, model, cwd });
  if (!res.ok) {
    setStatus('Failed to start: ' + (res.message || 'unknown'), 'bad');
    return;
  }

  if (res.fallback) {
    terminalStarted = false;
    updateTerminalStatus(model, cwd);
    setStatus('Embedded terminal unavailable, opened external CMD fallback.', 'warn');
    $("aiStatus").textContent = 'External CMD opened (fallback)';
    return;
  }

  // embedded terminal started
  initXtermIfNeeded();
  terminalStarted = true;
  terminalAccum = '';
  $("terminal").textContent = '';
  updateTerminalStatus(model, cwd);
  setStatus('Embedded model terminal started.', '');
  $("aiStatus").textContent = 'Model running: ' + model;
};

$("stopModelBtn").onclick = async () => {
  await window.modelTerminal.stop();
  terminalStarted = false;
  updateTerminalStatus('', '');
  setStatus('Model terminal stopped.');
  $("aiStatus").textContent = 'Model stopped.';
};

$("clearTerminalBtn").onclick = async () => {
  if (xtermInstance) {
    xtermInstance.clear();
  } else {
    $("terminal").textContent = '';
  }
  terminalAccum = '';
};

$("copyTerminalBtn").onclick = async () => {
  try {
    await navigator.clipboard.writeText(terminalAccum || $("terminal").textContent);
    setStatus('Terminal output copied.');
  } catch (e) {
    setStatus('Copy failed: ' + e.message, 'bad');
  }
};

createModelChips();

const savedFolder = localStorage.getItem("cmd_tool_folder");
if (savedFolder) {
  currentFolder = savedFolder;
  $("cwdText").textContent = savedFolder;
  loadFiles().catch(() => {});
}

setTimeout(() => { if (xtermInstance) xtermInstance.focus(); else $("terminal").focus(); }, 300);
</script>
</body>
</html>
