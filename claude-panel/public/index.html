<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>CMD Visible Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body{margin:0;background:#0b1020;color:#eef3ff;font-family:Segoe UI,Arial,sans-serif}
  .wrap{max-width:1200px;margin:0 auto;padding:18px}
  h1{margin:0 0 12px;font-size:24px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .box{background:#121a2f;border:2px solid #263653;border-radius:18px;padding:14px}
  .cmdBox{border-color:#ffd166;box-shadow:0 0 0 2px rgba(255,209,102,.15)}
  label{display:block;color:#9aa9c7;font-size:13px;margin:10px 0 5px}
  input,textarea,select{width:100%;box-sizing:border-box;background:#0c1325;color:#eef3ff;border:1px solid #263653;border-radius:12px;padding:10px;font-size:14px}
  textarea{min-height:130px;resize:vertical}
  button{border:0;border-radius:12px;padding:11px 14px;font-weight:800;cursor:pointer;background:#7aa2ff;color:#071024}
  button.secondary{background:#263653;color:#eef3ff}
  button.danger{background:#5b2332;color:#ffe3ea}
  .row{display:flex;gap:8px;align-items:center;margin-top:8px}
  .row button{flex:0 0 auto}
  pre{white-space:pre-wrap;background:#080d19;border:1px solid #263653;border-radius:14px;padding:12px;min-height:150px;overflow:auto}
  .bigTitle{font-size:19px;font-weight:900;color:#ffd166;margin-bottom:8px}
  .status{color:#56d364;font-size:13px;margin-top:8px;min-height:18px}
  .tokens{display:flex;gap:10px;margin-top:8px;color:#9aa9c7;font-size:13px}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <h1>Claude Proxy Panel, bản CMD thấy ngay</h1>

  <div class="grid">
    <div class="box cmdBox">
      <div class="bigTitle">CMD / TERMINAL TRONG UI</div>

      <label>Thư mục thao tác</label>
      <div class="row">
        <input id="cwd" placeholder="Ví dụ F:\1_A_Disk_D\Tool\sanbox\release\V-0">
        <button class="secondary" id="pickFolder">CHỌN THƯ MỤC</button>
      </div>

      <label>Lệnh CMD</label>
      <textarea id="cmd">dir</textarea>

      <div class="row">
        <button id="runCmd">CHẠY CMD</button>
        <button class="secondary" id="copyCmd">COPY LỆNH</button>
        <button class="secondary" id="copyOut">COPY OUTPUT</button>
        <button class="danger" id="clearOut">XÓA OUTPUT</button>
      </div>

      <div class="status" id="cmdStatus"></div>
      <label>Output CMD</label>
      <pre id="cmdOut">Chưa chạy lệnh.</pre>
    </div>

    <div class="box">
      <div class="bigTitle" style="color:#7aa2ff">CHAT CLAUDE NHẸ</div>

      <label>Base URL</label>
      <input id="baseUrl" value="https://unlimited.aiprimetech.io">

      <label>Token</label>
      <input id="token" type="password" placeholder="Dán token">

      <label>Model</label>
      <select id="model">
        <option value="claude-haiku-4-5-20251001">claude-haiku-4-5-20251001</option>
        <option value="claude-3-7-sonnet-20250219">claude-3-7-sonnet-20250219</option>
        <option value="claude-3-5-sonnet-20241022">claude-3-5-sonnet-20241022</option>
      </select>

      <label>Prompt</label>
      <textarea id="prompt">ping</textarea>

      <div class="row">
        <button id="sendChat">GỬI CLAUDE</button>
        <button class="secondary" id="copyReply">COPY REPLY</button>
        <button class="secondary" id="copyAll">COPY TOÀN BỘ</button>
      </div>

      <div class="tokens">
        <div>Input: <b id="inTok">0</b></div>
        <div>Output: <b id="outTok">0</b></div>
      </div>

      <div class="status" id="chatStatus"></div>
      <label>Reply</label>
      <pre id="reply">Chưa gửi.</pre>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let lastCmdOut = "";
let lastReply = "";

function saveLocal(){
  localStorage.setItem("panel_cwd", $("cwd").value);
  localStorage.setItem("panel_baseUrl", $("baseUrl").value);
  localStorage.setItem("panel_model", $("model").value);
}
function loadLocal(){
  $("cwd").value = localStorage.getItem("panel_cwd") || "";
  $("baseUrl").value = localStorage.getItem("panel_baseUrl") || $("baseUrl").value;
  $("model").value = localStorage.getItem("panel_model") || $("model").value;
}
async function post(url, body){
  const r = await fetch(url, {method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify(body||{})});
  const data = await r.json();
  if(!r.ok || data.ok === false) throw new Error(data.error || "Lỗi");
  return data;
}
function dangerous(cmd){
  return /git\s+push|deploy|rm\s+-rf|del\s+\/s|format\s|type\s+\.env|cat\s+\.env/i.test(cmd);
}

$("pickFolder").onclick = async () => {
  $("cmdStatus").textContent = "Đang mở chọn thư mục...";
  try {
    const data = await post("/api/pick-folder", {});
    if(data.folder){
      $("cwd").value = data.folder;
      saveLocal();
      $("cmdStatus").textContent = "Đã chọn: " + data.folder;
    } else {
      $("cmdStatus").textContent = "Không chọn thư mục.";
    }
  } catch(e) {
    $("cmdStatus").textContent = "Lỗi chọn thư mục: " + e.message;
  }
};

$("runCmd").onclick = async () => {
  const command = $("cmd").value.trim();
  if(!command){ $("cmdStatus").textContent = "Chưa nhập lệnh."; return; }
  if(dangerous(command) && !confirm("Lệnh có vẻ nguy hiểm. Chạy tiếp không?")) return;

  saveLocal();
  $("cmdStatus").textContent = "Đang chạy CMD...";
  $("cmdOut").textContent = "Đang chạy...";
  try {
    const data = await post("/api/cmd", {cwd:$("cwd").value.trim(), command});
    lastCmdOut =
      "CWD: " + data.cwd + "\n" +
      "COMMAND: " + data.command + "\n" +
      "EXIT: " + data.exitCode + "\n\n" +
      "STDOUT:\n" + (data.stdout || "") + "\n\n" +
      "STDERR:\n" + (data.stderr || "");
    $("cmdOut").textContent = lastCmdOut;
    $("cmdStatus").textContent = data.ok ? "CMD chạy xong OK." : "CMD chạy xong nhưng có lỗi.";
  } catch(e) {
    lastCmdOut = "ERROR: " + e.message;
    $("cmdOut").textContent = lastCmdOut;
    $("cmdStatus").textContent = "Lỗi CMD.";
  }
};

$("copyCmd").onclick = () => navigator.clipboard.writeText($("cmd").value);
$("copyOut").onclick = () => navigator.clipboard.writeText(lastCmdOut || $("cmdOut").textContent);
$("clearOut").onclick = () => { lastCmdOut=""; $("cmdOut").textContent="Đã xóa output."; };

$("sendChat").onclick = async () => {
  const prompt = $("prompt").value.trim();
  if(!prompt){ $("chatStatus").textContent = "Chưa nhập prompt."; return; }

  $("prompt").value = "";
  $("chatStatus").textContent = "Đang gửi Claude...";
  $("reply").textContent = "Đang chờ...";
  saveLocal();

  try {
    const data = await post("/api/chat", {
      baseUrl:$("baseUrl").value.trim(),
      token:$("token").value.trim(),
      model:$("model").value,
      maxTokens:800,
      prompt
    });
    lastReply = data.reply || "";
    $("reply").textContent = lastReply;
    $("inTok").textContent = data.usage?.input_tokens || 0;
    $("outTok").textContent = data.usage?.output_tokens || 0;
    $("chatStatus").textContent = "Claude trả lời xong.";
  } catch(e) {
    lastReply = "ERROR: " + e.message;
    $("reply").textContent = lastReply;
    $("chatStatus").textContent = "Lỗi Claude.";
  }
};

$("copyReply").onclick = () => navigator.clipboard.writeText(lastReply || $("reply").textContent);
$("copyAll").onclick = () => {
  const text =
    "### CMD OUTPUT\n" + $("cmdOut").textContent + "\n\n" +
    "### CLAUDE REPLY\n" + $("reply").textContent;
  navigator.clipboard.writeText(text);
};

loadLocal();
</script>
</body>
</html>
